[workspace]
name = "mep-individual-subject-tracking-report"
channels = [
    'https://repo.prefix.dev/ecoscope-workflows/',
    'https://repo.prefix.dev/ecoscope-workflows-custom/',
    'conda-forge',
]
platforms = ['linux-64', 'osx-arm64', 'win-64']

[dependencies]
curl = "*"
rattler-build = "*"
yq = "*"
hatch = "*"
pip="*"
hatch-vcs="*"

[feature.compile.dependencies]
ecoscope-workflows-ext-mep = "0.0.17.*"
ecoscope-workflows-ext-mnc = "0.0.7.*"
ecoscope-workflows-ext-ste = "0.0.18.*"
ecoscope-workflows-ext-big-life = "0.0.8.*"
ecoscope-workflows-core = "0.22.17.*"
ecoscope-workflows-ext-custom = "0.0.39.*"

[environments]
compile = { features = ["compile"], no-default-feature = true }
